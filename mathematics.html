<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYF - SSC Bank Railway Math | Complete Learning Platform</title>
    <meta name="description" content="SYF Mathematics - Complete SSC, Bank, Railway exam preparation with video lectures, PDF notes, CBT exams and class images">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --primary-dark: #1d4ed8;
            --accent: #f97316;
            --accent-light: #fb923c;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f1f5f9;
            --bg-alt: #e2e8f0;
            --card-bg: #ffffff;
            --card-bg-alt: #f8fafc;
            --text: #0f172a;
            --text-secondary: #475569;
            --text-light: #64748b;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
            --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.04);
            --shadow-xl: 0 25px 50px -12px rgba(0,0,0,0.15);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 24px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --font-en: 'Inter', system-ui, -apple-system, sans-serif;
            --font-hi: 'Noto Sans Devanagari', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-en);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* ========== HEADER ========== */
        .header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 30%, #1e3a5f 60%, #0f172a 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: white;
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(20px);
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .header-inner {
            max-width: 1300px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--accent), #ea580c);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 900;
            color: white;
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.5);
            position: relative;
            overflow: hidden;
        }
        .logo-icon::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .logo-text h1 { 
            font-size: 1.5rem; 
            font-weight: 800; 
            letter-spacing: -0.5px; 
            line-height: 1.2;
            background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-text span {
            font-size: 0.7rem;
            color: var(--accent-light);
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header-stats {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .stat-badge {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            padding: 10px 18px;
            border-radius: var(--radius);
            border: 1px solid rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: var(--transition);
        }
        .stat-badge:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }
        .stat-badge i { color: var(--accent-light); font-size: 1rem; }

        /* ========== MAIN CONTAINER ========== */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* Search Section */
        .search-section {
            margin-bottom: 32px;
        }
        .search-wrapper {
            position: relative;
            max-width: 500px;
        }
        .search-wrapper input {
            width: 100%;
            padding: 15px 55px 15px 22px;
            border: 2px solid var(--border);
            border-radius: 50px;
            font-size: 1rem;
            font-family: var(--font-en);
            background: var(--card-bg);
            transition: var(--transition);
            outline: none;
            box-shadow: var(--shadow-sm);
        }
        .search-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1), var(--shadow-md);
            transform: translateY(-1px);
        }
        .search-wrapper input::placeholder { color: var(--text-light); }
        .search-wrapper i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 1.2rem;
            transition: var(--transition);
        }
        .search-wrapper input:focus + i { color: var(--primary); }

        /* Section Title */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title i { color: var(--accent); }
        .sort-btns { display: flex; gap: 6px; }
        .sort-btn {
            padding: 8px 14px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: var(--transition);
            color: var(--text-secondary);
        }
        .sort-btn.active, .sort-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

        /* Chapter Grid */
        .chapter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .chapter-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 28px;
            box-shadow: var(--shadow);
            cursor: pointer;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: var(--transition-slow);
            group: true;
        }
        .chapter-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }
        .chapter-card:hover::before { transform: scaleX(1); }
        .chapter-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-light);
        }
        .chapter-card:active { transform: scale(0.98); }

        .chapter-number {
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .chapter-number::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
        }
        .chapter-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
            line-height: 1.3;
        }
        .chapter-desc {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 18px;
            line-height: 1.5;
        }
        .chapter-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .meta-item {
            font-size: 0.78rem;
            background: var(--card-bg-alt);
            padding: 7px 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
            color: var(--text-secondary);
            border: 1px solid var(--border-light);
            transition: var(--transition);
        }
        .meta-item i { color: var(--primary); font-size: 0.85rem; }

        /* ========== MODAL ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            width: 95%;
            max-width: 1050px;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-xl);
            animation: modalSlideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes modalSlideIn {
            from { opacity: 0; transform: scale(0.92) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            padding: 20px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            flex-shrink: 0;
        }
        .modal-header h3 {
            font-size: 1.2rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80%;
        }
        .modal-close {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #f1f5f9;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .modal-close:hover { background: var(--danger); color: white; transform: rotate(90deg); }

        .modal-body {
            padding: 24px 28px;
            overflow-y: auto;
            flex: 1;
        }

        /* Tabs */
        .tab-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            background: var(--card-bg);
            padding: 8px 0;
            z-index: 5;
        }
        .tab-btn {
            padding: 10px 20px;
            border: 2px solid var(--border);
            background: white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: var(--transition);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .tab-btn:hover:not(.active) { border-color: var(--primary-light); background: #eff6ff; }
        .tab-content { display: none; animation: fadeSlideIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Notes */
        .notes-list { display: flex; flex-direction: column; gap: 10px; }
        .note-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 18px;
            background: var(--card-bg-alt);
            border-radius: var(--radius);
            cursor: pointer;
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .note-item:hover { background: #eff6ff; border-color: var(--primary-light); transform: translateX(4px); }
        .note-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.1rem; flex-shrink: 0;
        }
        .note-info { flex: 1; } .note-info strong { display: block; font-size: 0.95rem; }
        .note-info small { font-size: 0.8rem; color: var(--text-light); }

        /* Lectures */
        .lectures-list { display: flex; flex-direction: column; gap: 12px; }
        .lecture-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: var(--card-bg-alt);
            border-radius: var(--radius);
            cursor: pointer;
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .lecture-item:hover { background: #fff7ed; border-color: var(--accent-light); transform: translateX(4px); }
        .lecture-thumb {
            width: 130px; height: 73px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            flex-shrink: 0;
            background: #1e293b;
        }
        .lecture-info { flex: 1; } .lecture-info strong { display: block; } .lecture-info small { color: var(--text-light); font-size: 0.82rem; }
        .lecture-play {
            width: 40px; height: 40px;
            background: #ff0000; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1rem; flex-shrink: 0;
            transition: var(--transition);
        }
        .lecture-item:hover .lecture-play { transform: scale(1.15); box-shadow: 0 4px 15px rgba(255,0,0,0.4); }

        /* Video Container */
        .video-wrapper { position: relative; width: 100%; padding-bottom: 56.25%; border-radius: var(--radius); overflow: hidden; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* PDF Viewer */
        .pdf-wrapper { width: 100%; height: 70vh; border-radius: var(--radius); overflow: hidden; background: #fff; border: 1px solid var(--border); }
        .pdf-wrapper iframe { width: 100%; height: 100%; border: none; }

        /* CBT */
        .cbt-container { text-align: center; padding: 50px 20px; }
        .cbt-btn {
            padding: 18px 44px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; border: none; border-radius: var(--radius);
            font-size: 1.1rem; font-weight: 700; cursor: pointer;
            transition: var(--transition);
            display: inline-flex; align-items: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }
        .cbt-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(37, 99, 235, 0.5); }

        /* Images Gallery */
        .image-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 12px; }
        .gallery-item {
            border-radius: var(--radius); overflow: hidden; cursor: pointer;
            aspect-ratio: 1; border: 2px solid transparent; transition: var(--transition);
        }
        .gallery-item:hover { border-color: var(--primary); transform: scale(1.04); box-shadow: var(--shadow-md); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: var(--transition-slow); }
        .gallery-item:hover img { transform: scale(1.08); }

        /* Back Button */
        .back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 9px 18px; background: var(--primary); color: white;
            border: none; border-radius: 20px; cursor: pointer;
            margin-bottom: 14px; font-weight: 600; font-size: 0.85rem;
            transition: var(--transition);
        }
        .back-btn:hover { background: var(--primary-dark); transform: translateX(-3px); }

        /* Lightbox */
        .lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 3000;
            display: none; align-items: center; justify-content: center;
        }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 92%; max-height: 92%; border-radius: var(--radius-lg); animation: zoomIn 0.3s ease; }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .lightbox-close { position: absolute; top: 24px; right: 36px; color: white; font-size: 2.2rem; cursor: pointer; transition: var(--transition); }
        .lightbox-close:hover { color: var(--danger); transform: scale(1.2); }

        /* Spinner */
        .spinner-container { display: flex; justify-content: center; padding: 40px; }
        .spinner {
            width: 44px; height: 44px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Empty State */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
        .empty-state i { font-size: 4rem; opacity: 0.2; margin-bottom: 16px; }
        .empty-state h3 { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 6px; }
        .empty-state p { font-size: 0.9rem; }

        /* Responsive */
        @media (max-width: 768px) {
            .header-inner { flex-direction: column; text-align: center; }
            .header-stats { justify-content: center; }
            .chapter-grid { grid-template-columns: 1fr; }
            .modal { width: 98%; max-height: 95vh; border-radius: var(--radius-lg); }
            .tab-btn { font-size: 0.78rem; padding: 8px 14px; }
            .lecture-thumb { width: 100px; height: 56px; }
            .image-gallery { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }
    </style>
</head>
<body>

    <!-- ========== HEADER ========== -->
    <header class="header">
        <div class="header-inner">
            <div class="logo-section">
                <div class="logo-icon">SYF</div>
                <div class="logo-text">
                    <h1>SYF Mathematics</h1>
                    <span>SSC • BANK • RAILWAY</span>
                </div>
            </div>
            <div class="header-stats">
                <div class="stat-badge"><i class="fas fa-book-open"></i><span id="totalChapters">0</span> Chapters</div>
                <div class="stat-badge"><i class="fas fa-file-pdf"></i><span id="totalNotes">0</span> Notes</div>
                <div class="stat-badge"><i class="fas fa-play-circle"></i><span id="totalLectures">0</span> Lectures</div>
            </div>
        </div>
    </header>

    <!-- ========== MAIN CONTENT ========== -->
    <div class="container">
        <div class="search-section">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Search chapters by name or description..." oninput="filterChapters()">
                <i class="fas fa-search"></i>
            </div>
        </div>
        
        <div class="section-header">
            <div class="section-title"><i class="fas fa-list-ol"></i> All Chapters</div>
            <div class="sort-btns">
                <button class="sort-btn active" onclick="sortChapters('order')">📋 Order</button>
                <button class="sort-btn" onclick="sortChapters('name')">🔤 Name</button>
            </div>
        </div>

        <div class="chapter-grid" id="chapterGrid">
            <div class="spinner-container"><div class="spinner"></div></div>
        </div>
    </div>

    <!-- ========== MODAL ========== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Chapter Details</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="switchTab('lectures', event)"><i class="fas fa-play-circle"></i> Lectures</button>
                    <button class="tab-btn" onclick="switchTab('notes', event)"><i class="fas fa-file-pdf"></i> Notes</button>
                    <button class="tab-btn" onclick="switchTab('cbt', event)"><i class="fas fa-question-circle"></i> CBT</button>
                    <button class="tab-btn" onclick="switchTab('images', event)"><i class="fas fa-images"></i> Images</button>
                </div>
                <div class="tab-content active" id="tab-lectures"><div id="lecturesList"><div class="spinner-container"><div class="spinner"></div></div></div></div>
                <div class="tab-content" id="tab-notes"><div id="notesList"><div class="spinner-container"><div class="spinner"></div></div></div></div>
                <div class="tab-content" id="tab-cbt"><div id="cbtContainer"><div class="spinner-container"><div class="spinner"></div></div></div></div>
                <div class="tab-content" id="tab-images"><div class="image-gallery" id="imageGallery"><div class="spinner-container"><div class="spinner"></div></div></div></div>
            </div>
        </div>
    </div>

    <!-- ========== LIGHTBOX ========== -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img src="" alt="Full size image" id="lightboxImg">
    </div>

    <!-- ========== SCRIPTS ========== -->
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCOKKBSbZJk8QSGvj1CPYQb_kjQb1tXO6s",
            authDomain: "starlet-registor.firebaseapp.com",
            databaseURL: "https://starlet-registor-default-rtdb.firebaseio.com",
            projectId: "starlet-registor",
            storageBucket: "starlet-registor.firebasestorage.app",
            messagingSenderId: "904193225045",
            appId: "1:904193225045:web:0c9ed3f3d7251862ff7fdc",
            measurementId: "G-1NLM1F0262"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Global State
        let allChapters = [];
        let currentChapterId = null;
        let totalNotesCount = 0;
        let totalLecturesCount = 0;
        let currentSort = 'order';
        let _lecturesHTML = null;
        let _notesHTML = null;

        // ========== LOAD ALL CHAPTERS ==========
        function loadChapters() {
            db.ref('chapters').on('value', (snapshot) => {
                allChapters = [];
                totalNotesCount = 0;
                totalLecturesCount = 0;

                if (snapshot.exists()) {
                    const promises = [];
                    
                    snapshot.forEach((child) => {
                        const obj = { id: child.key, ...child.val() };
                        
                        // Count notes
                        const notePromise = db.ref(`chapters/${child.key}/notes`).once('value')
                            .then(ns => {
                                obj.notesCount = ns.exists() ? ns.numChildren() : 0;
                                totalNotesCount += obj.notesCount;
                            });
                        promises.push(notePromise);

                        // Count lectures
                        const lecturePromise = db.ref(`chapters/${child.key}/lectures`).once('value')
                            .then(ls => {
                                obj.lecturesCount = ls.exists() ? ls.numChildren() : 0;
                                totalLecturesCount += obj.lecturesCount;
                            });
                        promises.push(lecturePromise);

                        allChapters.push(obj);
                    });

                    Promise.all(promises).then(() => {
                        sortAndRender();
                        updateStats();
                    });
                } else {
                    document.getElementById('chapterGrid').innerHTML = `
                        <div class="empty-state" style="grid-column:1/-1;">
                            <i class="fas fa-book-open"></i>
                            <h3>No Chapters Available</h3>
                            <p>Teacher will add chapters soon. Stay tuned!</p>
                        </div>`;
                    updateStats();
                }
            }, (error) => {
                console.error('Firebase Error:', error);
                document.getElementById('chapterGrid').innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Failed to Load</h3>
                        <p>Please check your connection and try again</p>
                    </div>`;
            });
        }

        // ========== SORTING ==========
        function sortChapters(type) {
            currentSort = type;
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            sortAndRender();
        }

        function sortAndRender() {
            let sorted = [...allChapters];
            if (currentSort === 'order') {
                sorted.sort((a, b) => (a.order || 999) - (b.order || 999));
            } else if (currentSort === 'name') {
                sorted.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
            }
            renderChapters(sorted);
        }

        // ========== RENDER CHAPTERS ==========
        function renderChapters(chapters) {
            const grid = document.getElementById('chapterGrid');
            
            if (!chapters || chapters.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <i class="fas fa-search"></i>
                        <h3>No Chapters Found</h3>
                        <p>Try a different search term</p>
                    </div>`;
                return;
            }

            grid.innerHTML = chapters.map((ch, i) => `
                <div class="chapter-card" onclick="openChapter('${ch.id}')">
                    <div class="chapter-number">Chapter ${ch.order || i + 1}</div>
                    <div class="chapter-title">${escapeHTML(ch.title || 'Untitled Chapter')}</div>
                    <div class="chapter-desc">${escapeHTML(ch.description || 'Click to explore lectures, notes, CBT & more...')}</div>
                    <div class="chapter-meta">
                        <span class="meta-item"><i class="fas fa-play-circle"></i> ${ch.lecturesCount || 0} Lectures</span>
                        <span class="meta-item"><i class="fas fa-file-pdf"></i> ${ch.notesCount || 0} Notes</span>
                        <span class="meta-item"><i class="fas fa-question-circle"></i> ${ch.hasCBT ? 'CBT Available' : 'No CBT'}</span>
                    </div>
                </div>
            `).join('');
        }

        // ========== FILTER ==========
        function filterChapters() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!query) { sortAndRender(); return; }
            const filtered = allChapters.filter(c => 
                (c.title || '').toLowerCase().includes(query) || 
                (c.description || '').toLowerCase().includes(query)
            );
            renderChapters(filtered);
        }

        // ========== OPEN MODAL ==========
        function openChapter(chapterId) {
            currentChapterId = chapterId;
            const ch = allChapters.find(c => c.id === chapterId);
            if (!ch) return;
            
            document.getElementById('modalTitle').textContent = ch.title || 'Chapter Details';
            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
            
            // Reset all tabs
            loadLectures(chapterId);
            loadNotes(chapterId);
            loadCBT(chapterId);
            loadImages(chapterId);
            
            // Switch to lectures tab first
            const firstTab = document.querySelector('.tab-btn');
            if (firstTab) switchTab('lectures', { target: firstTab });
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = '';
            currentChapterId = null;
            _lecturesHTML = null;
            _notesHTML = null;
        }

        document.getElementById('modalOverlay').addEventListener('click', e => {
            if (e.target === e.currentTarget) closeModal();
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') { closeModal(); closeLightbox(); }
        });

        // ========== TAB SWITCHING ==========
        function switchTab(name, event) {
            const clickedBtn = event.target.closest('.tab-btn');
            if (!clickedBtn) return;
            
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            clickedBtn.classList.add('active');
            const tabContent = document.getElementById(`tab-${name}`);
            if (tabContent) tabContent.classList.add('active');
        }

        // ========== LECTURES ==========
        function loadLectures(chapterId) {
            const container = document.getElementById('lecturesList');
            container.innerHTML = '<div class="spinner-container"><div class="spinner"></div></div>';
            
            db.ref(`chapters/${chapterId}/lectures`).on('value', snap => {
                if (snap.exists()) {
                    const lectures = [];
                    snap.forEach(c => lectures.push({ id: c.key, ...c.val() }));
                    lectures.reverse(); // Newest first
                    
                    if (lectures.length === 0) {
                        container.innerHTML = '<div class="empty-state"><i class="fas fa-play-circle"></i><h3>No Lectures Yet</h3></div>';
                        return;
                    }
                    
                    container.innerHTML = lectures.map((l, i) => {
                        const videoId = extractYouTubeID(l.youtubeUrl);
                        const thumb = videoId ? `https://img.youtube.com/vi/${videoId}/mqdefault.jpg` : '';
                        return `
                        <div class="lecture-item" onclick="playLecture('${videoId}', '${escapeHTML(l.title || 'Lecture ' + (i+1)).replace(/'/g, "\\'")}')">
                            <img class="lecture-thumb" src="${thumb}" alt="Thumbnail" 
                                 onerror="this.style.display='none'">
                            <div class="lecture-info">
                                <strong>${escapeHTML(l.title || 'Lecture ' + (i+1))}</strong>
                                <small>${escapeHTML(l.description || '')}</small>
                            </div>
                            <div class="lecture-play"><i class="fas fa-play"></i></div>
                        </div>`;
                    }).join('');
                } else {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-play-circle"></i><h3>No Lectures Yet</h3><p>Teacher will add lectures soon</p></div>';
                }
            }, error => {
                console.error('Lectures Error:', error);
                container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Failed to Load</h3></div>';
            });
        }

        function extractYouTubeID(url) {
            if (!url) return null;
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/)([^#&?]{11})/,
                /^([a-zA-Z0-9_-]{11})$/
            ];
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        function playLecture(videoId, title) {
            if (!videoId) return alert('Invalid YouTube URL');
            const container = document.getElementById('lecturesList');
            _lecturesHTML = container.innerHTML;
            
            container.innerHTML = `
                <button class="back-btn" onclick="backToLecturesList()"><i class="fas fa-arrow-left"></i> Back to Lectures</button>
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1" 
                            allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen>
                    </iframe>
                </div>
                <h4 style="margin-top:12px;">▶ ${title}</h4>`;
            
            document.getElementById('modalTitle').textContent = '🎥 ' + title;
        }

        function backToLecturesList() {
            if (_lecturesHTML) {
                document.getElementById('lecturesList').innerHTML = _lecturesHTML;
                _lecturesHTML = null;
            }
            const ch = allChapters.find(c => c.id === currentChapterId);
            if (ch) document.getElementById('modalTitle').textContent = ch.title || 'Chapter Details';
        }

        // ========== NOTES (PDF) ==========
        function loadNotes(chapterId) {
            const container = document.getElementById('notesList');
            container.innerHTML = '<div class="spinner-container"><div class="spinner"></div></div>';
            
            db.ref(`chapters/${chapterId}/notes`).on('value', snap => {
                if (snap.exists()) {
                    const notes = [];
                    snap.forEach(c => notes.push({ id: c.key, ...c.val() }));
                    
                    if (notes.length === 0) {
                        container.innerHTML = '<div class="empty-state"><i class="fas fa-file-pdf"></i><h3>No Notes Yet</h3></div>';
                        return;
                    }
                    
                    container.innerHTML = notes.map(n => `
                        <div class="note-item" onclick="openPdfInModal('${n.pdfUrl}', '${escapeHTML(n.title).replace(/'/g, "\\'")}')">
                            <div class="note-icon"><i class="fas fa-file-pdf"></i></div>
                            <div class="note-info">
                                <strong>${escapeHTML(n.title)}</strong>
                                <small>Click to view PDF</small>
                            </div>
                            <i class="fas fa-eye" style="color:var(--primary);"></i>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-file-pdf"></i><h3>No Notes Yet</h3><p>Teacher will add PDF notes soon</p></div>';
                }
            }, error => {
                console.error('Notes Error:', error);
                container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Failed to Load</h3></div>';
            });
        }

        function openPdfInModal(pdfUrl, title) {
            const container = document.getElementById('notesList');
            _notesHTML = container.innerHTML;
            
            container.innerHTML = `
                <button class="back-btn" onclick="backToNotesList()"><i class="fas fa-arrow-left"></i> Back to Notes</button>
                <div class="pdf-wrapper">
                    <iframe src="${pdfUrl}" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
                </div>
                <p style="text-align:center; margin-top:12px;">
                    <a href="${pdfUrl}" target="_blank" rel="noopener" style="color:var(--primary); font-weight:500;">
                        <i class="fas fa-external-link-alt"></i> Open in New Tab
                    </a>
                </p>`;
            
            document.getElementById('modalTitle').textContent = '📄 ' + title;
        }

        function backToNotesList() {
            if (_notesHTML) {
                document.getElementById('notesList').innerHTML = _notesHTML;
                _notesHTML = null;
            }
            const ch = allChapters.find(c => c.id === currentChapterId);
            if (ch) document.getElementById('modalTitle').textContent = ch.title || 'Chapter Details';
        }

        // ========== CBT ==========
        function loadCBT(chapterId) {
            const container = document.getElementById('cbtContainer');
            container.innerHTML = '<div class="spinner-container"><div class="spinner"></div></div>';
            
            db.ref(`chapters/${chapterId}/cbt`).on('value', snap => {
                if (snap.exists()) {
                    const cbt = snap.val();
                    if (cbt.cbtUrl) {
                        container.innerHTML = `
                            <div class="cbt-container">
                                <i class="fas fa-brain" style="font-size:3rem; color:var(--primary); margin-bottom:16px;"></i>
                                <h3>🧠 CBT Exam Ready</h3>
                                <p style="color:var(--text-light); margin:12px 0 24px;">Test your knowledge with this exam</p>
                                <button class="cbt-btn" onclick="window.open('${cbt.cbtUrl}', '_blank')">
                                    <i class="fas fa-play-circle"></i> Start CBT Exam
                                </button>
                                <p style="margin-top:16px; font-size:0.8rem; color:var(--text-light);">
                                    📁 ${cbt.filename || 'cbt.html'}
                                </p>
                            </div>`;
                    } else {
                        container.innerHTML = '<div class="empty-state"><i class="fas fa-hourglass-half"></i><h3>CBT Coming Soon</h3></div>';
                    }
                } else {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-hourglass-half"></i><h3>CBT Coming Soon</h3><p>Teacher will add exam soon</p></div>';
                }
            });
        }

        // ========== IMAGES ==========
        function loadImages(chapterId) {
            const container = document.getElementById('imageGallery');
            container.innerHTML = '<div class="spinner-container" style="grid-column:1/-1;"><div class="spinner"></div></div>';
            
            db.ref(`chapters/${chapterId}/images`).on('value', snap => {
                if (snap.exists()) {
                    const imgs = [];
                    snap.forEach(c => imgs.push({ id: c.key, ...c.val() }));
                    
                    if (imgs.length === 0) {
                        container.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><i class="fas fa-images"></i><h3>No Images</h3></div>';
                        return;
                    }
                    
                    container.innerHTML = imgs.map(i => `
                        <div class="gallery-item" onclick="openLightbox('${i.url}')" title="${escapeHTML(i.title || 'Class Image')}">
                            <img src="${i.url}" alt="${escapeHTML(i.title || 'Class Image')}" loading="lazy">
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><i class="fas fa-images"></i><h3>No Images Yet</h3><p>Teacher will upload class images soon</p></div>';
                }
            });
        }

        // ========== LIGHTBOX ==========
        function openLightbox(url) {
            document.getElementById('lightboxImg').src = url;
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        // ========== UTILS ==========
        function escapeHTML(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function updateStats() {
            document.getElementById('totalChapters').textContent = allChapters.length;
            document.getElementById('totalNotes').textContent = totalNotesCount;
            document.getElementById('totalLectures').textContent = totalLecturesCount;
        }

        // ========== INIT ==========
        document.addEventListener('DOMContentLoaded', () => {
            loadChapters();
        });
    </script>
</body>
</html>
