<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYF - SSC Bank Railway Math</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --primary: #1a73e8; --accent: #ff6d00; --bg: #f0f4f8; --card-bg: #ffffff; --text: #1a1a2e; --text-light: #5f6368; --border: #e0e0e0; --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px; --transition: all 0.3s ease; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); color: white; padding: 20px 0; position: sticky; top: 0; z-index: 1000; }
        .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px; }
        .logo-section { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 50px; height: 50px; background: var(--accent); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; }
        .logo-text h1 { font-size: 1.5rem; font-weight: 800; } .logo-text span { font-size: 0.75rem; color: #ffab40; }
        .header-stats { display: flex; gap: 20px; }
        .stat-badge { background: rgba(255,255,255,0.1); padding: 10px 18px; border-radius: 12px; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .stat-badge i { color: #ffab40; }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .search-wrapper { position: relative; max-width: 500px; margin-bottom: 30px; }
        .search-wrapper input { width: 100%; padding: 14px 50px 14px 20px; border: 2px solid var(--border); border-radius: 50px; font-size: 1rem; outline: none; }
        .search-wrapper i { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: var(--text-light); }
        .section-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 20px; }
        .chapter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .chapter-card { background: var(--card-bg); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); cursor: pointer; border: 1px solid var(--border); border-left: 5px solid var(--primary); transition: var(--transition); }
        .chapter-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
        .chapter-number { font-size: 0.8rem; color: var(--primary); font-weight: 700; }
        .chapter-title { font-size: 1.2rem; font-weight: 700; margin: 6px 0; }
        .chapter-desc { font-size: 0.9rem; color: var(--text-light); margin-bottom: 12px; }
        .chapter-meta { display: flex; gap: 12px; flex-wrap: wrap; }
        .meta-item { font-size: 0.8rem; background: #f5f5f5; padding: 5px 12px; border-radius: 20px; display: flex; align-items: center; gap: 5px; }
        .meta-item i { color: var(--primary); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--card-bg); border-radius: var(--radius); width: 90%; max-width: 900px; max-height: 85vh; overflow-y: auto; animation: modalIn 0.3s ease; }
        @keyframes modalIn { from { opacity:0; transform: scale(0.9); } to { opacity:1; transform: scale(1); } }
        .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; position: sticky; top: 0; background: var(--card-bg); }
        .modal-close { width: 40px; height: 40px; border-radius: 50%; border: none; background: #f5f5f5; cursor: pointer; font-size: 1.2rem; }
        .modal-close:hover { background: #ff5252; color: white; }
        .modal-body { padding: 24px; }
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border: 2px solid var(--border); border-radius: 25px; cursor: pointer; font-weight: 600; transition: var(--transition); }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .tab-content { display: none; } .tab-content.active { display: block; }
        .notes-list { display: flex; flex-direction: column; gap: 10px; }
        .note-item { display: flex; align-items: center; gap: 15px; padding: 15px; background: #f8fafc; border-radius: 12px; text-decoration: none; color: var(--text); border: 1px solid var(--border); transition: var(--transition); }
        .note-item:hover { background: #e8f0fe; border-color: var(--primary); }
        .note-icon { width: 45px; height: 45px; background: #ff5252; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.2rem; }
        .note-info strong { display: block; }
        .cbt-container { text-align: center; padding: 40px; }
        .cbt-btn { padding: 16px 40px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; gap: 10px; }
        .cbt-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(26,115,232,0.4); }
        .image-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .gallery-item { border-radius: 12px; overflow: hidden; cursor: pointer; aspect-ratio: 1; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: var(--transition); }
        .gallery-item:hover img { transform: scale(1.1); }
        .pdf-viewer { width: 100%; height: 80vh; border: none; border-radius: 12px; }
        .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .lightbox.active { display: flex; } .lightbox img { max-width: 90%; max-height: 90%; border-radius: 12px; }
        .lightbox-close { position: absolute; top: 20px; right: 30px; color: white; font-size: 2rem; cursor: pointer; }
        .spinner { width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
        .empty-state i { font-size: 4rem; opacity: 0.3; }
        @media (max-width:768px) { .chapter-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-inner">
            <div class="logo-section">
                <div class="logo-icon">SYF</div>
                <div class="logo-text"><h1>SYF Mathematics</h1><span>SSC • BANK • RAILWAY</span></div>
            </div>
            <div class="header-stats">
                <div class="stat-badge"><i class="fas fa-book-open"></i><span id="totalChapters">0 Chapters</span></div>
                <div class="stat-badge"><i class="fas fa-file-pdf"></i><span id="totalNotes">0 Notes</span></div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Chapter search karein..." oninput="filterChapters()">
            <i class="fas fa-search"></i>
        </div>
        <div class="section-title"><i class="fas fa-list-ol" style="color:var(--accent);"></i> All Chapters</div>
        <div class="chapter-grid" id="chapterGrid"><div class="empty-state" style="grid-column:1/-1;"><div class="spinner"></div><p>Loading...</p></div></div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header"><h3 id="modalTitle">Chapter Details</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
            <div class="modal-body">
                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="switchTab('notes', event)"><i class="fas fa-file-pdf"></i> Notes</button>
                    <button class="tab-btn" onclick="switchTab('cbt', event)"><i class="fas fa-question-circle"></i> CBT Exam</button>
                    <button class="tab-btn" onclick="switchTab('images', event)"><i class="fas fa-images"></i> Images</button>
                </div>
                <div class="tab-content active" id="tab-notes"><div id="notesList"><div class="spinner"></div></div></div>
                <div class="tab-content" id="tab-cbt"><div id="cbtContainer"><div class="spinner"></div></div></div>
                <div class="tab-content" id="tab-images"><div class="image-gallery" id="imageGallery"><div class="spinner"></div></div></div>
            </div>
        </div>
    </div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()"><span class="lightbox-close">&times;</span><img src="" id="lightboxImg"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCOKKBSbZJk8QSGvj1CPYQb_kjQb1tXO6s",
            authDomain: "starlet-registor.firebaseapp.com",
            databaseURL: "https://starlet-registor-default-rtdb.firebaseio.com",
            projectId: "starlet-registor",
            storageBucket: "starlet-registor.firebasestorage.app",
            messagingSenderId: "904193225045",
            appId: "1:904193225045:web:0c9ed3f3d7251862ff7fdc",
            measurementId: "G-1NLM1F0262"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allChapters = [], currentChapterId = null, totalNotesCount = 0;

        function loadChapters() {
            db.ref('chapters').on('value', (snapshot) => {
                allChapters = []; totalNotesCount = 0;
                if (snapshot.exists()) {
                    const promises = [];
                    snapshot.forEach((child) => {
                        const obj = { id: child.key, ...child.val() };
                        const p = db.ref(`chapters/${child.key}/notes`).once('value').then(ns => {
                            obj.notesCount = ns.exists() ? ns.numChildren() : 0;
                            totalNotesCount += obj.notesCount;
                        });
                        promises.push(p);
                        allChapters.push(obj);
                    });
                    Promise.all(promises).then(() => {
                        allChapters.sort((a,b) => (a.order||0)-(b.order||0));
                        renderChapters(allChapters);
                        updateStats();
                    });
                } else {
                    document.getElementById('chapterGrid').innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><i class="fas fa-book-open"></i><h3>No chapters yet</h3></div>';
                    updateStats();
                }
            });
        }

        function renderChapters(chapters) {
            const grid = document.getElementById('chapterGrid');
            if (!chapters.length) { grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><i class="fas fa-search"></i><h3>No match</h3></div>'; return; }
            grid.innerHTML = chapters.map((ch,i) => `
                <div class="chapter-card" onclick="openChapter('${ch.id}')">
                    <div class="chapter-number">Chapter ${ch.order||i+1}</div>
                    <div class="chapter-title">${ch.title||'Untitled'}</div>
                    <div class="chapter-desc">${ch.description||''}</div>
                    <div class="chapter-meta">
                        <span class="meta-item"><i class="fas fa-file-pdf"></i>${ch.notesCount||0} Notes</span>
                        <span class="meta-item"><i class="fas fa-question-circle"></i>${ch.hasCBT?'CBT Ready':'No CBT'}</span>
                        <span class="meta-item"><i class="fas fa-images"></i>${ch.imagesCount||0} Img</span>
                    </div>
                </div>`).join('');
        }

        function filterChapters() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderChapters(allChapters.filter(c => (c.title||'').toLowerCase().includes(q) || (c.description||'').toLowerCase().includes(q)));
        }

        function openChapter(id) {
            currentChapterId = id;
            const ch = allChapters.find(c => c.id === id);
            if(!ch) return;
            document.getElementById('modalTitle').textContent = ch.title;
            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
            loadNotes(id); loadCBT(id); loadImages(id);
            switchTab('notes', {target: document.querySelector('.tab-btn')});
        }

        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); document.body.style.overflow = ''; }
        document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
        document.addEventListener('keydown', e => { if(e.key==='Escape'){ closeModal(); closeLightbox(); } });

        function switchTab(name, event) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.closest('.tab-btn').classList.add('active');
            document.getElementById(`tab-${name}`).classList.add('active');
        }

        function loadNotes(chapterId) {
            const container = document.getElementById('notesList');
            container.innerHTML = '<div class="spinner"></div>';
            db.ref(`chapters/${chapterId}/notes`).on('value', snap => {
                if(snap.exists()){
                    const notes = [];
                    snap.forEach(c => notes.push({id:c.key, ...c.val()}));
                    if(!notes.length){ container.innerHTML = '<div class="empty-state"><i class="fas fa-file-pdf"></i><h3>No notes</h3></div>'; return; }
                    container.innerHTML = notes.map(n => `
                        <a href="${n.pdfUrl}" target="_blank" class="note-item">
                            <div class="note-icon"><i class="fas fa-file-pdf"></i></div>
                            <div class="note-info"><strong>${n.title}</strong><small style="color:var(--text-light);">PDFhost PDF</small></div>
                            <i class="fas fa-external-link-alt" style="color:var(--primary);"></i>
                        </a>`).join('');
                } else {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-file-pdf"></i><h3>No notes yet</h3></div>';
                }
            });
        }

        function loadCBT(chapterId) {
            const container = document.getElementById('cbtContainer');
            container.innerHTML = '<div class="spinner"></div>';
            db.ref(`chapters/${chapterId}/cbt`).on('value', snap => {
                if(snap.exists()){
                    const cbt = snap.val();
                    if(cbt.cbtUrl){
                        container.innerHTML = `
                            <div class="cbt-container">
                                <h3>🧠 CBT Exam Ready</h3>
                                <p style="color:var(--text-light); margin:10px 0 20px;">Click below to start</p>
                                <button class="cbt-btn" onclick="window.open('${cbt.cbtUrl}', '_blank')">
                                    <i class="fas fa-play-circle"></i> Start CBT Exam
                                </button>
                                <p style="margin-top:15px; font-size:0.8rem; color:var(--text-light);">📁 ${cbt.filename}</p>
                            </div>`;
                    } else { showEmptyCBT(container); }
                } else { showEmptyCBT(container); }
            });
        }

        function showEmptyCBT(el) { el.innerHTML = '<div class="empty-state"><i class="fas fa-hourglass-half"></i><h3>Coming Soon</h3></div>'; }

        function loadImages(chapterId) {
            const container = document.getElementById('imageGallery');
            container.innerHTML = '<div class="spinner"></div>';
            db.ref(`chapters/${chapterId}/images`).on('value', snap => {
                if(snap.exists()){
                    const imgs = [];
                    snap.forEach(c => imgs.push({id:c.key, ...c.val()}));
                    if(!imgs.length){ container.innerHTML = '<div class="empty-state"><i class="fas fa-images"></i><h3>No images</h3></div>'; return; }
                    container.innerHTML = imgs.map(i => `
                        <div class="gallery-item" onclick="openLightbox('${i.url}')"><img src="${i.url}" alt="${i.title}" loading="lazy"></div>`).join('');
                } else {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-images"></i><h3>No images</h3></div>';
                }
            });
        }

        function openLightbox(url) { document.getElementById('lightboxImg').src=url; document.getElementById('lightbox').classList.add('active'); }
        function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }

        function updateStats() {
            document.getElementById('totalChapters').textContent = `${allChapters.length} Chapters`;
            document.getElementById('totalNotes').textContent = `${totalNotesCount} Notes`;
        }

        document.addEventListener('DOMContentLoaded', loadChapters);
    </script>
</body>
</html>
